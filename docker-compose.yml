version: '3.8'

services:

  # ─── Base de données MySQL ───────────────────────────────
  db:
    image: mysql:8.0
    container_name: nextgrc_db
    restart: always
    environment:
      MYSQL_DATABASE: next-v2-
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: nextgrc
      MYSQL_PASSWORD: nextgrc123
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  # ─── Laravel App ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextgrc_app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=production
      - APP_KEY=base64:qDJ8GbWzBGyShaFX+CrxT6RcXxaBixc3diGp4x2Ocqk=
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=next-v2-
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - ML_SERVICE_URL=http://flask:5000
    depends_on:
      - db
    ports:
      - "8000:9000"

  # ─── Nginx (serveur web) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nextgrc_nginx
    restart: always
    ports:
      - "8080:80" 
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # ─── Flask ML Service ─────────────────────────────────────
  flask:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: nextgrc_flask
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./ml:/app

volumes:
  db_data: