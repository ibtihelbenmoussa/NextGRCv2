name: NextGRCv2 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    name: 🚀 Déploiement sur VM
    runs-on: self-hosted
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Créer le fichier .env
        run: |
          cd $GITHUB_WORKSPACE
          cp .env.example .env || true
          # Générer la clé Laravel (optionnel)
          docker-compose run --rm app php artisan key:generate || true

      - name: Déployer avec Docker
        run: |
          cd $GITHUB_WORKSPACE
          
          # Arrêter les conteneurs existants
          docker-compose down
          
          # Construire et démarrer
          docker-compose up -d --build
          
          # Attendre que les services démarrent
          sleep 15
          
          # Vérifier l'état
          docker-compose ps
          
          # Migrer la base de données
          docker-compose exec -T app php artisan migrate --force || true
          
          echo "✅ Déploiement terminé avec succès !"

      - name: Vérification de santé
        run: |
          # Tester si l'application répond
          for i in {1..30}; do
            if curl -s http://localhost:80 > /dev/null; then
              echo "✅ Application accessible"
              exit 0
            fi
            echo "En attente du service... ($i/30)"
            sleep 2
          done
          echo "❌ L'application ne répond pas"
          exit 1