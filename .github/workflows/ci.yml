name: NextGRCv2 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    name: 🚀 Déploiement sur VM
    runs-on: self-hosted
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Créer le fichier .env
        run: |
          cd $GITHUB_WORKSPACE
          cp .env.docker .env

      - name: Déployer avec Docker
        env:
          COMPOSE_HTTP_TIMEOUT: 300
        run: |
          cd $GITHUB_WORKSPACE
          docker-compose down
          docker-compose up -d --build
          sleep 30
          docker-compose ps
          docker-compose exec -T app php artisan migrate --force || true
          echo "✅ Déploiement terminé avec succès !"

      - name: Vérification de santé
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Application accessible"
              exit 0
            fi
            echo "En attente du service... ($i/30)"
            sleep 2
          done
          echo "❌ L'application ne répond pas"
          exit 1