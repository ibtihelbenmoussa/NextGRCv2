global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus se monitore lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métriques du serveur (CPU, RAM, disk)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Métriques Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']

  # Métriques Flask ML
  - job_name: 'flask-ml'
    static_configs:
      - targets: ['flask:5000']